services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - health-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - health-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - health-net

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: healthdb
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - health-net

  influxdb:
    image: influxdb:2.7-alpine
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: health123
      DOCKER_INFLUXDB_INIT_ORG: health-org
      DOCKER_INFLUXDB_INIT_BUCKET: health-bucket
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: health-token-123
    volumes:
      - influx-data:/var/lib/influxdb2
    networks:
      - health-net

  iot-simulator:
    build: ./iot-simulator
    container_name: iot-simulator
    depends_on:
      - kafka
    environment:
      KAFKA_BROKER: kafka:9092
      TOPIC: health-data
      PATIENTS: 5
      INTERVAL: 2
    networks:
      - health-net
    restart: on-failure

  kafka-consumer:
    build: ./kafka-consumer
    container_name: kafka-consumer
    depends_on:
      - kafka
    environment:
      KAFKA_BROKER: kafka:9092
      TOPIC: health-data
    networks:
      - health-net
    restart: on-failure

  storage-service:
    build: ./storage-service
    container_name: storage-service
    depends_on:
      - kafka
      - postgres
      - influxdb
    environment:
      KAFKA_BROKER: kafka:9092
      TOPIC: health-data
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: healthdb
      PG_USER: health
      PG_PASSWORD: health123
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: health-token-123
      INFLUX_ORG: health-org
      INFLUX_BUCKET: health-bucket
    networks:
      - health-net
    restart: on-failure

  ml-service:
    build: ./ml-service
    container_name: ml-service
    depends_on:
      - kafka
    ports:
      - "8000:8000"
    environment:
      KAFKA_BROKER: kafka:9092
      INPUT_TOPIC: health-data
      OUTPUT_TOPIC: health-scores
    networks:
      - health-net
    restart: on-failure

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    depends_on:
      - postgres
      - ml-service
    ports:
      - "5000:5000"
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: healthdb
      PG_USER: health
      PG_PASSWORD: health123
      ML_SERVICE: http://ml-service:8000
    networks:
      - health-net
    restart: on-failure

  dashboard:
    build: ./dashboard
    container_name: dashboard
    depends_on:
      - api-gateway
    ports:
      - "3000:3000"
    networks:
      - health-net
    restart: on-failure

  dashboard-nextjs:
    build: ./dashboard-nextjs
    container_name: dashboard-nextjs
    depends_on:
      - api-gateway
    ports:
      - "3001:3001"
    networks:
      - health-net
    restart: on-failure

volumes:
  postgres-data:
  influx-data:

networks:
  health-net:
    driver: bridge
